<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0d12; color: #e8eaf0; font-family: 'Syne', sans-serif; min-height: 100vh; }
header { border-bottom: 1px solid #1e2530; padding: 20px 20px 16px; position: sticky; top: 0; background: #0a0d12; z-index: 10; display: flex; align-items: center; gap: 14px; }
.logo-mark { width: 36px; height: 36px; background: #1a4fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 13px; color: white; flex-shrink: 0; }
.header-text h1 { font-size: 15px; font-weight: 700; }
.header-text p { font-size: 11px; color: #4a5568; font-family: 'DM Mono', monospace; margin-top: 2px; }
#key-badge { margin-left: auto; display: none; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 10px; color: #00c97a; background: rgba(0,201,122,0.08); border: 1px solid rgba(0,201,122,0.2); border-radius: 20px; padding: 4px 10px; cursor: pointer; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #00c97a; }
.content { padding: 28px 20px 60px; }
#api-screen { max-width: 420px; margin: 60px auto 0; text-align: center; }
#api-screen h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, #e8eaf0, #6a7a99); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#api-screen p { color: #4a5568; font-size: 13px; line-height: 1.6; margin-bottom: 28px; font-family: 'DM Mono', monospace; }
.field-label { font-size: 11px; font-family: 'DM Mono', monospace; color: #4a5568; text-align: left; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
input { width: 100%; background: #111520; border: 1px solid #1e2530; border-radius: 10px; padding: 14px 16px; color: #e8eaf0; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.15s; }
input:focus { border-color: #1a4fff; }
input::placeholder { color: #2a3347; }
.btn { background: #1a4fff; border: none; border-radius: 10px; padding: 14px 22px; color: white; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
.btn:hover { background: #2a5fff; }
.btn:active { transform: scale(0.98); }
.btn-full { width: 100%; margin-top: 10px; }
#search-screen { display: none; }
.search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
.search-bar input { flex: 1; }
.error-msg { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.2); border-radius: 10px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: #ff8888; margin-bottom: 16px; display: none; }
.loading { text-align: center; padding: 60px 0; color: #4a5568; font-family: 'DM Mono', monospace; font-size: 12px; display: none; }
.spinner { width: 28px; height: 28px; border: 2px solid #1e2530; border-top-color: #1a4fff; border-radius: 50%; margin: 0 auto 16px; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 0; }
.empty-state .icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-family: 'DM Mono', monospace; font-size: 12px; color: #2a3347; }
.result-card { background: #111520; border: 1px solid #1e2530; border-radius: 12px; padding: 16px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; margin-bottom: 8px; transition: border-color 0.15s; }
.result-card:hover { border-color: #2a3a5a; background: #131825; }
.result-number { font-family: 'DM Mono', monospace; font-size: 11px; color: #4a5568; flex-shrink: 0; background: #0a0d12; border: 1px solid #1e2530; border-radius: 6px; padding: 4px 8px; }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: #4a5568; margin-top: 3px; }
.status-pill { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.06em; }
.status-active { background: rgba(0,201,122,0.1); color: #00c97a; border: 1px solid rgba(0,201,122,0.2); }
.status-dissolved { background: rgba(255,68,68,0.1); color: #ff6666; border: 1px solid rgba(255,68,68,0.2); }
.status-other { background: rgba(245,166,35,0.1); color: #f5a623; border: 1px solid rgba(245,166,35,0.2); }
.arrow { color: #2a3a5a; font-size: 18px; }
#detail-screen { display: none; }
.back-btn { background: none; border: none; color: #4a5568; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 20px; padding: 0; }
.back-btn:hover { color: #e8eaf0; }
.verdict-card { border-radius: 14px; padding: 22px; margin-bottom: 14px; border: 1px solid; display: flex; align-items: center; gap: 20px; }
.score-circle { width: 64px; height: 64px; border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; flex-direction: column; flex-shrink: 0; }
.score-num { font-size: 20px; font-weight: 800; line-height: 1; }
.score-label { font-family: 'DM Mono', monospace; font-size: 8px; opacity: 0.7; margin-top: 2px; }
.verdict-text h2 { font-size: 17px; font-weight: 800; letter-spacing: 0.04em; }
.verdict-text p { font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0.6; margin-top: 3px; }
.section { background: #111520; border: 1px solid #1e2530; border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.section-title { font-size: 11px; font-family: 'DM Mono', monospace; color: #4a5568; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; }
.flag { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 8px; }
.flag:last-child { margin-bottom: 0; }
.flag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.flag-green { color: #c0f0db; } .flag-green .flag-dot { background: #00c97a; }
.flag-amber { color: #fde8b0; } .flag-amber .flag-dot { background: #f5a623; }
.flag-red { color: #ffc0c0; } .flag-red .flag-dot { background: #ff4444; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item label { font-family: 'DM Mono', monospace; font-size: 10px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
.info-item span { font-size: 13px; color: #c0c8d8; word-break: break-word; }
.full-width { grid-column: 1 / -1; }
.officer-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #1e2530; gap: 12px; }
.officer-item:last-child { border-bottom: none; padding-bottom: 0; }
.officer-item:first-child { padding-top: 0; }
.officer-name { font-size: 13px; font-weight: 600; color: #e8eaf0; }
.officer-role { font-family: 'DM Mono', monospace; font-size: 10px; color: #4a5568; margin-top: 3px; text-transform: capitalize; }
.officer-date { font-family: 'DM Mono', monospace; font-size: 10px; color: #4a5568; text-align: right; flex-shrink: 0; }
.resigned-tag { font-family: 'DM Mono', monospace; font-size: 9px; color: #ff6666; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); border-radius: 4px; padding: 2px 5px; margin-top: 3px; display: inline-block; }
.sic-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.sic-tag { font-family: 'DM Mono', monospace; font-size: 10px; background: #0a0d12; border: 1px solid #1e2530; border-radius: 6px; padding: 4px 8px; color: #6a7a99; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease; }
</style>
</head>
<body>
<header>
  <div class="logo-mark">CH</div>
  <div class="header-text">
    <h1>Company Checker</h1>
    <p>Companies House API · Live data</p>
  </div>
  <div id="key-badge" onclick="resetKey()"><div class="dot"></div>KEY ACTIVE · RESET</div>
</header>
<div class="content">
  <div id="api-screen">
    <h2>Enter your API key</h2>
    <p>Your key is used only in your browser. It is never stored or transmitted elsewhere.</p>
    <div class="field-label">Companies House REST API Key</div>
    <input type="password" id="api-key-input" placeholder="Paste your key here…" onkeydown="if(event.key==='Enter')confirmKey()">
    <button class="btn btn-full" onclick="confirmKey()">Connect →</button>
  </div>
  <div id="search-screen">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Company name or number…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn" onclick="doSearch()">Search</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="loading" id="loading"><div class="spinner"></div>Searching Companies House…</div>
    <div id="results-list">
      <div class="empty-state"><div class="icon">🔍</div><p>Search by company name or registration number</p></div>
    </div>
  </div>
  <div id="detail-screen">
    <button class="back-btn" onclick="showSearch()">← Back to results</button>
    <div id="detail-content"></div>
  </div>
</div>
<script>
// ---- REPLACE THIS with your Cloudflare Worker URL after deploying worker.js ----
const PROXY = 'https://companyhouse.charliechitty.workers.dev';
// -------------------------------------------------------------------------------

let apiKey = '';

function authHeader() {
  return { 'Authorization': 'Basic ' + btoa(apiKey + ':') };
}

async function chGet(path) {
  const r = await fetch(PROXY + path, { headers: authHeader() });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function confirmKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  apiKey = k;
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'block';
  document.getElementById('key-badge').style.display = 'flex';
}

function resetKey() {
  apiKey = '';
  document.getElementById('api-key-input').value = '';
  document.getElementById('api-screen').style.display = 'block';
  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('key-badge').style.display = 'none';
}

function showSearch() {
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'block';
}

function showError(msg) { const e=document.getElementById('error-msg'); e.textContent=msg; e.style.display='block'; }
function hideError() { document.getElementById('error-msg').style.display='none'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function statusClass(s) { return s==='active'?'status-active':s==='dissolved'?'status-dissolved':'status-other'; }
function fmtAddr(a) { if(!a)return'—'; return[a.premises,a.address_line_1,a.address_line_2,a.locality,a.postal_code].filter(Boolean).join(', '); }

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  hideError();
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results-list').innerHTML = '';
  try {
    const data = await chGet('/search/companies?q=' + encodeURIComponent(q) + '&items_per_page=10');
    const items = data.items || [];
    if (!items.length) showError('No companies found.');
    else renderResults(items);
  } catch(e) {
    if (e.message.includes('401')) showError('Invalid API key — tap KEY ACTIVE · RESET.');
    else showError('Search failed: ' + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResults(items) {
  document.getElementById('results-list').innerHTML = items.map(r=>`
    <div class="result-card" onclick="loadDetail('${esc(r.company_number)}')">
      <div class="result-number">${esc(r.company_number)}</div>
      <div class="result-info">
        <div class="result-name">${esc(r.title||'—')}</div>
        <div class="result-meta">${esc(r.address_snippet||'—')}</div>
      </div>
      <span class="status-pill ${statusClass(r.company_status)}">${r.company_status||'unknown'}</span>
      <span class="arrow">›</span>
    </div>`).join('');
}

async function loadDetail(num) {
  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'block';
  document.getElementById('detail-content').innerHTML = '<div class="loading" style="display:block"><div class="spinner"></div>Pulling company data…</div>';
  try {
    const [profile, officers, psc, filings] = await Promise.all([
      chGet('/company/'+num),
      chGet('/company/'+num+'/officers?items_per_page=20').catch(()=>({items:[]})),
      chGet('/company/'+num+'/persons-with-significant-control').catch(()=>({items:[]})),
      chGet('/company/'+num+'/filing-history?items_per_page=5').catch(()=>({items:[]})),
    ]);
    renderDetail(profile, officers, psc, filings);
  } catch(e) {
    document.getElementById('detail-content').innerHTML = '<div class="error-msg" style="display:block">Could not load: '+e.message+'</div>';
  }
}

function scoreIt(profile, officers, psc, filings) {
  let s=100, flags=[];
  const st=profile.company_status;
  if(st!=='active'){s-=50;flags.push({t:'red',x:'Status: '+(st||'unknown').replace(/-/g,' ')});}
  else flags.push({t:'green',x:'Status: Active'});
  if(profile.accounts?.overdue){s-=20;flags.push({t:'red',x:'Accounts overdue'});}
  else if(profile.accounts?.next_due) flags.push({t:'green',x:'Accounts up to date'});
  if(profile.date_of_creation){
    const d=(Date.now()-new Date(profile.date_of_creation))/86400000;
    if(d<30){s-=25;flags.push({t:'red',x:'Very new ('+Math.round(d)+' days old)'});}
    else if(d<180){s-=10;flags.push({t:'amber',x:'Recently incorporated ('+Math.round(d/30)+' months ago)'});}
    else flags.push({t:'green',x:'Established '+(d/365).toFixed(1)+' years ago'});
  }
  const active=(officers.items||[]).filter(o=>!o.resigned_on);
  if(!active.length){s-=30;flags.push({t:'red',x:'No active directors'});}
  else flags.push({t:'green',x:active.length+' active officer'+(active.length>1?'s':'')});
  const pi=psc.items||[];
  if(!pi.length){s-=15;flags.push({t:'amber',x:'No PSC records'});}
  else flags.push({t:'green',x:pi.length+' PSC record'+(pi.length>1?'s':'')+' found'});
  const last=(filings.items||[])[0];
  if(last){const mo=(Date.now()-new Date(last.date))/(86400000*30);
    if(mo>18){s-=10;flags.push({t:'amber',x:'Last filing '+Math.round(mo)+' months ago'});}
    else flags.push({t:'green',x:'Recently filed ('+Math.round(mo)+' months ago)'});}
  s=Math.max(0,s);
  const verdict=s>=75?'LIKELY LEGITIMATE':s>=45?'PROCEED WITH CAUTION':'HIGH RISK';
  const color=s>=75?'#00c97a':s>=45?'#f5a623':'#ff4444';
  return{s,flags,verdict,color};
}

function renderDetail(profile, officers, psc, filings) {
  const a=scoreIt(profile,officers,psc,filings);
  const off=officers.items||[], pi=psc.items||[];
  const flagsHtml=a.flags.map(f=>`<div class="flag flag-${f.t}"><div class="flag-dot"></div>${esc(f.x)}</div>`).join('');
  const offHtml=!off.length?'<p style="font-size:12px;color:#4a5568;font-family:monospace">No officers on record.</p>'
    :off.map(o=>`<div class="officer-item"><div><div class="officer-name">${esc(o.name)}</div><div class="officer-role">${esc((o.officer_role||'').replace(/-/g,' '))}</div>${o.resigned_on?'<span class="resigned-tag">Resigned</span>':''}</div><div class="officer-date"><div>Appointed</div><div>${o.appointed_on||'—'}</div>${o.resigned_on?'<div>'+o.resigned_on+'</div>':''}</div></div>`).join('');
  const pscHtml=!pi.length?'<p style="font-size:12px;color:#4a5568;font-family:monospace">No PSC data.</p>'
    :pi.map(p=>`<div class="officer-item"><div><div class="officer-name">${esc(p.name||p.company_name||'—')}</div><div class="officer-role">${esc((p.natures_of_control||[]).join(', ').replace(/-/g,' ')||'—')}</div></div><div class="officer-date"><div>Notified</div><div>${p.notified_on||'—'}</div></div></div>`).join('');
  const sicHtml=(profile.sic_codes||[]).length?'<div class="section-title" style="margin-top:14px;margin-bottom:8px">SIC Codes</div><div class="sic-tags">'+profile.sic_codes.map(c=>`<span class="sic-tag">${c}</span>`).join('')+'</div>':'';
  document.getElementById('detail-content').innerHTML=`
    <div class="fade-up">
      <div class="verdict-card" style="background:${a.color}0d;border-color:${a.color}33">
        <div class="score-circle" style="border-color:${a.color}"><span class="score-num" style="color:${a.color}">${a.s}</span><span class="score-label" style="color:${a.color}">/ 100</span></div>
        <div class="verdict-text"><h2 style="color:${a.color}">${a.verdict}</h2><p>${esc(profile.company_name)}</p><p style="margin-top:3px">#${profile.company_number}</p></div>
      </div>
      <div class="section"><div class="section-title">Assessment Flags</div>${flagsHtml}</div>
      <div class="section"><div class="section-title">Company Details</div>
        <div class="info-grid">
          <div class="info-item"><label>Number</label><span>${profile.company_number}</span></div>
          <div class="info-item"><label>Status</label><span style="text-transform:capitalize">${(profile.company_status||'—').replace(/-/g,' ')}</span></div>
          <div class="info-item"><label>Type</label><span style="text-transform:capitalize">${(profile.type||'—').replace(/-/g,' ')}</span></div>
          <div class="info-item"><label>Incorporated</label><span>${profile.date_of_creation||'—'}</span></div>
          <div class="info-item full-width"><label>Address</label><span>${esc(fmtAddr(profile.registered_office_address))}</span></div>
          ${profile.jurisdiction?`<div class="info-item"><label>Jurisdiction</label><span style="text-transform:capitalize">${profile.jurisdiction}</span></div>`:''}
        </div>${sicHtml}
      </div>
      <div class="section"><div class="section-title">Officers (${off.length})</div>${offHtml}</div>
      <div class="section"><div class="section-title">Persons of Significant Control (${pi.length})</div>${pscHtml}</div>
    </div>`;
}
</script>
</body>
</html>
